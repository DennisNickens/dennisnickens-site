<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennis Nickens — Spiritual Romeo | Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Dancing+Script:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;}
    body{
        background:#0F172A;
        color:#fff;
        font-family:'Inter',sans-serif;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        position:relative;
    }

    /* GLOBE CANVAS BACKGROUND */
    #globe-canvas{
        position:fixed;
        inset:0;
        z-index:0;
        pointer-events:none;
    }

    /* PARTICLES */
    #particles-canvas{
        position:fixed;
        inset:0;
        z-index:1;
        pointer-events:none;
    }

    /* SPLASH LAYOUT — two column: photo left, text right */
    .splash-wrap{
        position:relative;
        z-index:10;
        display:flex;
        flex-direction:row;
        align-items:center;
        justify-content:center;
        gap:48px;
        padding:32px 48px;
        max-width:1100px;
        width:100%;
        animation:splashIn 1.2s ease both;
    }

    @media(max-width:700px){
        .splash-wrap{
              flex-direction:column;
              gap:24px;
              padding:24px 20px;
        }
    }

    @keyframes splashIn{
        from{opacity:0;transform:translateY(20px);}
        to{opacity:1;transform:translateY(0);}
    }

    /* FULL PHOTO — rectangular, no crop */
    .splash-photo-wrap{
        flex:0 0 auto;
        animation:splashIn 1.2s ease 0.1s both;
    }
    .splash-photo{
        display:block;
        width:auto;
        height:82vh;
        max-height:580px;
        max-width:420px;
        object-fit:contain;
        border-radius:8px;
        box-shadow:
              0 0 0 1px rgba(255,215,0,0.3),
              0 0 40px rgba(124,58,237,0.5),
              0 8px 60px rgba(0,0,0,0.6);
    }

    /* TEXT PANEL */
    .splash-text{
        flex:0 0 auto;
        display:flex;
        flex-direction:column;
        gap:20px;
        text-align:left;
        max-width:360px;
    }

    @media(max-width:700px){
        .splash-text{text-align:center;max-width:100%;}
        .splash-photo{height:55vw;max-height:340px;max-width:90vw;}
    }

    .splash-tagline{
        font-size:11px;
        font-weight:700;
        letter-spacing:5px;
        text-transform:uppercase;
        color:#FFD700;
        opacity:0.9;
        animation:splashIn 1.2s ease 0.3s both;
    }

    .splash-title{
        font-family:'Playfair Display',serif;
        font-size:clamp(40px,5vw,72px);
        font-weight:900;
        line-height:1.0;
        animation:splashIn 1.2s ease 0.5s both;
    }
    .splash-title .gold{
        background:linear-gradient(135deg,#FFD700,#FFA500);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
    }

    .splash-divider{
        width:60px;
        height:2px;
        background:linear-gradient(90deg,#FFD700,transparent);
        animation:splashIn 1.2s ease 0.6s both;
    }

    .splash-sub{
        font-family:'Dancing Script',cursive;
        font-size:clamp(20px,2.5vw,28px);
        color:rgba(255,255,255,0.7);
        animation:splashIn 1.2s ease 0.7s both;
    }

    .splash-desc{
        font-size:13px;
        line-height:1.7;
        color:rgba(255,255,255,0.45);
        letter-spacing:0.5px;
        animation:splashIn 1.2s ease 0.8s both;
    }

    /* PROGRESS BAR */
    .splash-progress-wrap{
        width:180px;
        height:2px;
        background:rgba(255,255,255,0.1);
        border-radius:2px;
        overflow:hidden;
        animation:splashIn 1.2s ease 0.9s both;
    }
    .splash-progress-bar{
        height:100%;
        width:0%;
        background:linear-gradient(90deg,#7C3AED,#FFD700);
        border-radius:2px;
        animation:progress 7s linear 1s forwards;
    }
    @keyframes progress{
        from{width:0%;}
        to{width:100%;}
    }
    .splash-hint{
        font-size:11px;
        color:rgba(255,255,255,0.3);
        letter-spacing:1px;
        animation:splashIn 1.2s ease 1s both;
    }
    #splash-countdown{
        color:#FFD700;
        font-weight:700;
    }
    </style>
  </head>
  <body>

      <!-- Rotating Globe Background -->
      <canvas id="globe-canvas"></canvas>canvas>

      <!-- Particles Overlay -->
      <canvas id="particles-canvas"></canvas>canvas>

      <!-- Splash Content -->
      <div class="splash-wrap">

            <!-- Full Photo (left) -->
            <div class="splash-photo-wrap">
                    <img class="splash-photo"
                                 src="Dennis20191110_0044_2.jpg"
                                 alt="Dennis Nickens">
            </div>div>

            <!-- Text (right) -->
            <div class="splash-text">
                    <div class="splash-tagline">✦ Spiritual Romeo ✦</div>div>

                    <h1 class="splash-title">
                              <span class="gold">Dennis</span>span><br>Nickens
                    </h1>h1>

                    <div class="splash-divider"></div>div>

                    <p class="splash-sub">Relationship Consultant</p>p>

                    <p class="splash-desc">Helping individuals and couples<br>build the love they've always wanted.</p>p>

                    <div class="splash-progress-wrap">
                              <div class="splash-progress-bar"></div>div>
                    </div>div>

                    <p class="splash-hint">Entering in <span id="splash-countdown">7</span>span> seconds…</p>p>
            </div>div>

      </div>div>

    <script>
        // SESSION STORAGE CHECK — skip splash if user has already visited this session
        if (sessionStorage.getItem('splashSeen')) {
              window.location.replace('index.html');
        }

        // Mark splash as seen for this session
        sessionStorage.setItem('splashSeen', '1');

        // AUTO REDIRECT after 7 seconds
        var sc = 7;
        var si = setInterval(function(){
              sc--;
              var el = document.getElementById('splash-countdown');
              if (el) el.textContent = sc;
              if (sc <= 0) clearInterval(si);
        }, 1000);
        setTimeout(function(){
              window.location.href = 'index.html';
        }, 7000);

        // ROTATING GLOBE
        (function(){
              const canvas = document.getElementById('globe-canvas');
              const ctx = canvas.getContext('2d');
              let W, H, cx, cy, R, rot = 0;
              function resize(){
                      W = canvas.width = window.innerWidth;
                      H = canvas.height = window.innerHeight;
                      cx = W/2; cy = H/2;
                      R = Math.min(W, H) * 0.42;
              }
              resize();
              window.addEventListener('resize', resize);
              function drawGlobe(){
                      ctx.clearRect(0, 0, W, H);
                      const grd = ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, R*1.2);
                      grd.addColorStop(0, 'rgba(124,58,237,0.07)');
                      grd.addColorStop(0.5, 'rgba(59,130,246,0.04)');
                      grd.addColorStop(1, 'transparent');
                      ctx.beginPath();
                      ctx.arc(cx, cy, R*1.2, 0, Math.PI*2);
                      ctx.fillStyle = grd;
                      ctx.fill();
                      ctx.save();
                      const numLon = 12;
                      for(let i = 0; i < numLon; i++){
                                const angle = rot + (i/numLon)*Math.PI*2;
                                const cosA = Math.cos(angle);
                                const rx = Math.abs(cosA)*R;
                                const opacity = 0.06 + 0.10*Math.abs(cosA);
                                ctx.strokeStyle = `rgba(124,58,237,${opacity})`;
                                ctx.lineWidth = 1;
                                if(rx > 1){
                                            ctx.beginPath();
                                            ctx.ellipse(cx, cy, rx, R, 0, 0, Math.PI*2);
                                            ctx.stroke();
                                }
                      }
                      const numLat = 8;
                      for(let j = 1; j < numLat; j++){
                                const phi = (j/numLat)*Math.PI;
                                const y = cy + R*Math.cos(phi);
                                const r = R*Math.sin(phi);
                                const opacity = 0.05 + 0.05*Math.sin(phi);
                                ctx.beginPath();
                                ctx.ellipse(cx, y, r, r*0.25, 0, 0, Math.PI*2);
                                ctx.strokeStyle = `rgba(59,130,246,${opacity})`;
                                ctx.lineWidth = 0.8;
                                ctx.stroke();
                      }
                      ctx.beginPath();
                      ctx.ellipse(cx, cy, R, R*0.25, 0, 0, Math.PI*2);
                      ctx.strokeStyle = 'rgba(255,215,0,0.10)';
                      ctx.lineWidth = 1.5;
                      ctx.stroke();
                      ctx.beginPath();
                      ctx.arc(cx, cy, R, 0, Math.PI*2);
                      ctx.strokeStyle = 'rgba(124,58,237,0.15)';
                      ctx.lineWidth = 1.5;
                      ctx.stroke();
                      ctx.restore();
                      rot += 0.003;
                      requestAnimationFrame(drawGlobe);
              }
              drawGlobe();
        })();

        // PARTICLES
        (function(){
              const canvas = document.getElementById('particles-canvas');
              const ctx = canvas.getContext('2d');
              let particles = [];
              function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
              resize();
              window.addEventListener('resize', resize);
              class Particle{
                      constructor(){ this.reset(); }
                      reset(){
                                this.x = Math.random()*canvas.width;
                                this.y = Math.random()*canvas.height;
                                this.vx = (Math.random()-.5)*.3;
                                this.vy = (Math.random()-.5)*.3;
                                this.radius = Math.random()*1.4+.3;
                                this.alpha = Math.random()*.4+.06;
                                const r = Math.random();
                                this.color = r>.65?'#7C3AED':r>.35?'#3B82F6':'#FFD700';
                      }
                      update(){
                                this.x += this.vx; this.y += this.vy;
                                if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset();
                      }
                      draw(){
                                ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
                                ctx.fillStyle=this.color; ctx.globalAlpha=this.alpha; ctx.fill(); ctx.globalAlpha=1;
                      }
              }
              for(let i=0;i<60;i++) particles.push(new Particle());
              function animate(){
                      ctx.clearRect(0,0,canvas.width,canvas.height);
                      particles.forEach(p=>{p.update();p.draw();});
                      requestAnimationFrame(animate);
              }
              animate();
        })();
    </script>
  </body>

    </script>
  </body>
